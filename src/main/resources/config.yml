port: 8080
api-key: "change-me"
# Bind address for embedded HTTP server. Use 127.0.0.1 for local debugging.
# For production, set to 0.0.0.0 or your public hostname.
host: 127.0.0.1
# Hologram settings
hologram-ttl-seconds: 0
hologram-refresh-seconds: 5

# Scoreboard API settings (override base URL if needed)
scoreboard-base-url: "https://www.sentrysmp.eu/api"
# Cache TTL for scoreboard client (seconds)
scoreboard-cache-ttl: 60