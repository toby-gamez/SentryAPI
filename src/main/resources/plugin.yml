name: SentryAPI
main: com.sentrysmp.CommandApiPlugin
version: 1.2
api-version: "1.21"
description: A tool plugin for SentrySMP
author: Taneq
commands:
  sentrysmp:
    description: Main SentrySMP command
    usage: /sentrysmp holo add <all|today|week|month>
    permission: sentrysmp.use
    permission-message: You do not have permission to use this command.
softdepend:
  - PlaceholderAPI
  - LuckPerms