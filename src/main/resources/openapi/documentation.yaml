openapi: "3.0.3"
info:
  title: "SentryAPI"
  version: "1.0.0"
servers:
  - url: "http://127.0.0.1:8080"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    CommandRequest:
      type: object
      properties:
        command:
          type: string
      required: [command]
    CommandResponse:
      type: object
      properties:
        output:
          type: array
          items:
            type: string
        success:
          type: boolean
    PlayerInfo:
      type: object
      properties:
        name:
          type: string
        uuid:
          type: string
    PlayersResponse:
      type: object
      properties:
        players:
          type: array
          items:
            $ref: '#/components/schemas/PlayerInfo'

paths:
  /command:
    post:
      summary: Dispatch a server command
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandRequest'
      responses:
        '200':
          description: Command output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
  /players:
    get:
      summary: List online players
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Players list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayersResponse'
