openapi: "3.0.3"
info:
  title: "SentryAPI"
  version: "1.0.0"
servers:
  - url: "http://127.0.0.1:8080"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    CommandRequest:
      type: object
      properties:
        command:
          type: string
      required: [command]
    CommandResponse:
      type: object
      properties:
        output:
          type: array
          items:
            type: string
        success:
          type: boolean
    PlayerInfo:
      type: object
      properties:
        name:
          type: string
        uuid:
          type: string
    PlayersResponse:
      type: object
      properties:
        players:
          type: array
          items:
            $ref: '#/components/schemas/PlayerInfo'
    BanEntry:
      type: object
      properties:
        name:
          type: string
        uuid:
          type: string
        reason:
          type: string
          nullable: true
    BanlistResponse:
      type: object
      properties:
        banned:
          type: array
          items:
            $ref: '#/components/schemas/BanEntry'
    PlayerStatsResponse:
      type: object
      properties:
        player:
          type: string
        coins:
          type: integer
          format: int64
          nullable: true
        money:
          type: number
          format: double
          nullable: true
        rank:
          type: string
          nullable: true
        error:
          type: string
          nullable: true

paths:
  /command:
    post:
      summary: Dispatch a server command
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandRequest'
      responses:
        '200':
          description: Command output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
  /banlist:
    get:
      summary: List banned players
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Banlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BanlistResponse'
  /players:
    get:
      summary: List online players
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Players list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayersResponse'
  /player/{name}:
    get:
      summary: Get stats for a player (coins and money)
      security:
        - ApiKeyAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Minecraft player name
      responses:
        '200':
          description: Player stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerStatsResponse'
        '400':
          description: Missing player name
