openapi: "3.0.3"
info:
  title: "SentryAPI"
  version: "1.0.0"
servers:
  - url: "http://{host}:{port}"
    description: "Configured server (set `host` and `port` in config.yml)"
    variables:
      host:
        default: "127.0.0.1"
        description: "Host configured in config.yml"
      port:
        default: "8080"
        description: "Port configured in config.yml"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    CommandRequest:
      type: object
      properties:
        commands:
          type: array
          items:
            type: string
        playerName:
          type: string
          description: Optional player name
        price:
          type: number
          format: double
          description: Price submitted by client in EUR
        cart:
          type: array
          description: Cart as JSON array of items
          items:
            $ref: '#/components/schemas/CartItem'
        voucher:
          type: string
          nullable: true
          description: Optional voucher code
      required: [commands, price, cart]
    CommandResponse:
      type: object
      properties:
        output:
          type: array
          items:
            type: string
        success:
          type: boolean
    PlayerInfo:
      type: object
      properties:
        name:
          type: string
        uuid:
          type: string
        rank:
          type: string
    PlayersResponse:
      type: object
      properties:
        players:
          type: array
          items:
            $ref: '#/components/schemas/PlayerInfo'
    BanEntry:
      type: object
      properties:
        name:
          type: string
        uuid:
          type: string
        reason:
          type: string
          nullable: true
    BanlistResponse:
      type: object
      properties:
        banned:
          type: array
          items:
            $ref: '#/components/schemas/BanEntry'
    PlayerStatsResponse:
      type: object
      properties:
        player:
          type: string
        coins:
          type: integer
          format: int64
          nullable: true
        money:
          type: number
          format: double
          nullable: true
        rank:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
    CartServer:
      type: object
      properties:
        Id:
          type: integer
        Name:
          type: string
        RCONIP:
          type: string
        RCONPort:
          type: integer
        RCONPassword:
          type: string
    CartKey:
      type: object
      properties:
        Id:
          type: integer
        Name:
          type: string
        Description:
          type: string
          nullable: true
        Price:
          type: number
          format: double
        Sale:
          type: number
          format: double
          nullable: true
        Image:
          type: string
          nullable: true
        GlobalMaxOrder:
          type: integer
          nullable: true
        Server:
          $ref: '#/components/schemas/CartServer'
        Type:
          type: string
          nullable: true
    CartItem:
      type: object
      properties:
        Key:
          $ref: '#/components/schemas/CartKey'
        Quantity:
          type: integer
    VoucherResponse:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        description:
          type: string
          nullable: true
        startDate:
          type: string
          format: date-time
        expirationDate:
          type: string
          format: date-time
        maxUses:
          type: integer
          nullable: true
        currentUses:
          type: integer
          nullable: true
        discountPercent:
          type: number
          format: double
        scope:
          type: string
          nullable: true
        scopeCategory:
          type: string
          nullable: true
        scopeItemId:
          type: integer
          nullable: true
        isActive:
          type: boolean

paths:
  /command:
    post:
      summary: Dispatch a server command
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandRequest'
      responses:
        '200':
          description: Command output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
  /banlist:
    get:
      summary: List banned players
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Banlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BanlistResponse'
  /players:
    get:
      summary: List online players
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Players list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayersResponse'
  /player/{name}:
    get:
      summary: Get stats for a player (coins and money)
      security:
        - ApiKeyAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Minecraft player name
      responses:
        '200':
          description: Player stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerStatsResponse'
        '400':
          description: Missing player name
